system:
  name: "Test Monorepo"
  description: "A test monorepo with Java, Python, and C"

scan:
  include:
    - "services/**"
    - "libs/**"
  exclude:
    - "**/test/**"
    - "**/tests/**"
    - "**/node_modules/**"

levels:
  context: true
  container: true
  component: true

output:
  dir: docs/architecture
  theme: 0
  layout: elk
